; ============================================================
;  EnerTrack Home — PlatformIO Configuration
;  Board : ESP32 DevKit V1 (ou similar)
;  Framework: Arduino
; ============================================================

[env:enertrack-esp32]
platform  = espressif32
board     = esp32dev
framework = arduino

; ── Monitor serial ──────────────────────────────────────────
monitor_speed = 115200

; ── Filesystem (SPIFFS) ─────────────────────────────────────
board_build.partitions = min_spiffs.csv

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_BT_NIMBLE_ENABLED

; Dependências
lib_deps =
    ; BLE leve (usa NimBLE em vez da stack pesada do Arduino)
    h2zero/NimBLE-Arduino @ ^1.4.2
    ; Leitura SCT-013 via ADC (RMS de corrente)
    openenergymonitor/EmonLib @ ^1.1.0
    ; JSON (payload BLE)
    bblanchon/ArduinoJson @ ^7.0.0
  